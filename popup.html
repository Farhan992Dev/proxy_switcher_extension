<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      color: #00d2ff;
      margin-bottom: 12px;
      text-align: center;
    }
    .section { margin-bottom: 14px; }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }
    input[type="text"]:focus { border-color: #00d2ff; }
    .status {
      text-align: center;
      font-size: 12px;
      padding: 6px;
      border-radius: 6px;
      margin-top: 8px;
    }
    .status.on { background: #0f3460; color: #00d2ff; }
    .status.off { background: #2a1a1a; color: #ff6b6b; }
    .rule-list { max-height: 160px; overflow-y: auto; margin-top: 6px; }
    .rule-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 8px;
      background: #16213e;
      border-radius: 4px;
      margin-bottom: 4px;
      font-size: 12px;
    }
    .rule-item .pattern { flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .rule-item .type-tag {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      margin-left: 6px;
    }
    .type-proxy { background: #0f3460; color: #00d2ff; }
    .type-direct { background: #2a1a1a; color: #ff6b6b; }
    .btn-remove {
      background: none;
      border: none;
      color: #ff6b6b;
      cursor: pointer;
      font-size: 14px;
      margin-left: 8px;
    }
    .add-rule {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .add-rule input { flex: 1; }
    select {
      padding: 8px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 12px;
      outline: none;
    }
    .btn-add {
      padding: 8px 14px;
      background: #0f3460;
      border: 1px solid #00d2ff;
      border-radius: 6px;
      color: #00d2ff;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }
    .btn-add:hover { background: #00d2ff; color: #1a1a2e; }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      background: #16213e;
      border-radius: 6px;
    }
    .toggle {
      width: 40px; height: 22px;
      background: #2a1a1a;
      border-radius: 11px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle.active { background: #0f3460; }
    .toggle::after {
      content: '';
      width: 18px; height: 18px;
      background: #e0e0e0;
      border-radius: 50%;
      position: absolute;
      top: 2px; left: 2px;
      transition: transform 0.2s;
    }
    .toggle.active::after { transform: translateX(18px); background: #00d2ff; }
    .toggle-row select {
      padding: 4px 8px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 12px;
      outline: none;
    }
    .hint {
      font-size: 10px;
      color: #666;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>Proxy Switcher</h1>

  <div class="section">
    <div class="section-title">Proxy Address</div>
    <input type="text" id="proxyAddr" placeholder="e.g. 192.168.1.100:8080">
    <div class="hint">Format: host:port</div>
  </div>

  <div class="section">
    <div class="toggle-row">
      <span>Protocol</span>
      <select id="proxyProtocol">
        <option value="http">HTTP</option>
        <option value="socks5">SOCKS5</option>
      </select>
    </div>
  </div>

  <div class="section">
    <div class="toggle-row">
      <span>Enable Proxy</span>
      <div class="toggle" id="toggleProxy"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Per-Site Rules</div>
    <div class="rule-list" id="ruleList"></div>
    <div class="add-rule">
      <input type="text" id="rulePattern" placeholder="Pattern (e.g. *.example.com)">
      <select id="ruleType">
        <option value="proxy">Proxy</option>
        <option value="direct">Direct</option>
      </select>
      <button class="btn-add" id="addRule">Add</button>
    </div>
    <div class="hint">Use * as wildcard. *.example.com matches all subdomains.</div>
  </div>

  <div class="status off" id="status">Proxy disabled</div>

  <script src="popup.js"></script>
</body>
</html>
